services:
  into-the-dark:
    image: ghcr.io/maerica-server/intothedark:latest
    container_name: into-the-dark
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${INTO_THE_DARK_HTTP_PORT:-3870}:8888"
    environment:
      PORT: "8888"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:8888/', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
